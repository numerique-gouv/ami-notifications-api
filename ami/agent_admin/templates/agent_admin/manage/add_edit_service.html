{% extends "agent_admin/base.html" %}
{% load dsfr_tags %}

{% block content %}
  {% if instance.id %}
    <h1>Modifier une démarche</h1>
  {% else %}
    <h1>Ajouter une démarche</h1>
  {% endif %}
  <form method="post" id="service-form" class="form-disable-on-submit" novalidate>
    {% csrf_token %}
    {{ form }}
    {% dsfr_button_group btn_group %}
  </form>
{% endblock %}
