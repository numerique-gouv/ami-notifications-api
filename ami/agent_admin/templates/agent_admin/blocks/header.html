{% load static %}

<header role="banner" class="fr-header">
  <div class="fr-header__body">
    <div class="fr-container">
      <div class="fr-header__body-row">
        <div class="fr-header__brand fr-enlarge-link">
          <div class="fr-header__brand-top">
            <div class="fr-header__logo">
              <a href="{% url 'agent-admin:home' %}" title="Accueil - Espace Partenaire AMI">
                <p class="fr-logo">
                  <img src="{% static "img/logo_marianne_square.svg" %}" alt="Logo de la Marianne" />
                </p>
              </a>
            </div>
            <div class="header-title">
              <p>Espace Partenaire AMI</p>
            </div>
            <div class="fr-header__navbar">
              <button data-fr-opened="false" aria-controls="modal-header" title="Menu" type="button" id="button-header" class="fr-btn--menu fr-btn">Menu</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="fr-header__menu fr-modal" id="modal-header" aria-labelledby="button-header">
    <div class="fr-container">
      <button aria-controls="modal-header" title="Fermer" type="button" id="button-2168" class="fr-btn--close fr-btn">Fermer</button>
      <nav class="fr-nav" role="navigation" aria-label="Menu principal">
        <ul class="fr-nav__list">
          <li class="fr-nav__item">
            <a type="link" href="{% url 'agent-admin:home' %}" class="fr-nav__link">Accueil</a>
          </li>
          {% if request.user.agent.has_role_admin %}
            <li class="fr-nav__item">
              <a type="link" href="{% url 'agent-admin:manage-access' %}" class="fr-nav__link">Gestion des droits des agents</a>
            </li>
          {% endif %}
          <li class="fr-nav__item">
            <form action="{% url 'agent-admin:oidc_logout' %}" method="post" id="logout-form">
              {% csrf_token %}
              <input type="submit" value="Se déconnecter" class="fr-nav__link">
            </form>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</header>
