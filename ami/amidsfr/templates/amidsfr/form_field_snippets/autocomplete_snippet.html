{% load dsfr_tags %}
{# Generic input snippet used by most of the field types #}
<div class="{{ field.field.widget.group_class|default:'fr-input-group' }}{% if field.errors %} {{ field.field.widget.group_class|default:'fr-input-group' }}--error{% endif %}{% if field.field.disabled %} fr-input-group--disabled{% endif %}">
  <label for="{{ field.id_for_label }}" class="fr-label">
    {# djlint:off #}
    {{ field.label }}{% if field.field.required %}<span class="fr-required-marker">*</span>{% endif %}
    {% if field.help_text %}
      <span class="fr-hint-text" id="{{ field.id_for_label }}_helptext">{{ field.help_text|safe }}</span>
    {% endif %}
    {# djlint:on #}
  </label>
  <div class="fr-input-wrap {% if field.field.widget.with_button%}fr-input-wrap--action{% else %}fr-icon-search-line{% endif %}">
    {{ field|dsfr_input_class_attr }}
    {% if field.field.widget.with_button %}
      <button type="button" class="fr-btn fr-icon-search-line">Rechercher</button>
    {% endif %}
  </div>
  {% if field.errors %}
    <div id="{{ field.auto_id }}-desc-error">
      {{ field.errors }}
    </div>
  {% endif %}
</div>
